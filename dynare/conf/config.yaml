metadata:
  data_folder: data
  periods: 1000
  num_samples: 6000

models:

  Ramsey_base:
    dynare_model_settings:
      periods: ${metadata.periods}
      num_samples:
        base: ${metadata.num_samples}
        coefficient: 1.0  # actual = int(base * coefficient)
      column_names:
        - Consumption
        - Capital
        - Output
        - Investment
      parameter_ranges:
        start_capital: [0.5, 3.0]
        alpha: [0.33, 0.66]
        beta: [0.95, 0.99]
        delta: [0.02, 0.15]

    rl_env_settings:
      discount_factor_param: beta
      reward: lib.rewards.log_reward
      reward_kwargs:
        target_column: Consumption
      input:
        state_columns:
          - [Capital, -1]
          - Output
        action_columns:
          - Consumption
        endogenous_columns:
          - Investment
      output:
        data_path: ./data/interim/Ramsey_base


  Ramsey_crra:
    dynare_model_settings:
      periods: ${metadata.periods}
      num_samples:
        base: ${metadata.num_samples}
        coefficient: 0.5  # actual = int(base * coefficient)
      column_names:
        - ConsumptionPerCapita
        - CapitalPerCapita
        - OutputPerCapita
        - InvestmentPerCapita
      parameter_ranges:
        start_capital: [0.5, 3.0]
        start_labor: [1.0, 1.0]
        alpha: [0.33, 0.66]
        beta: [0.95, 0.99]
        delta: [0.02, 0.15]
        sigma: [0.5, 3.0]
        n: [0.0, 0.02]

    rl_env_settings:
      discount_factor_param: beta
      reward: lib.rewards.crra_reward
      reward_kwargs:
        target_column: ConsumptionPerCapita
        sigma_column: sigma
      input:
        state_columns:
          - [CapitalPerCapita, -1]
          - OutputPerCapita
          - Labor
        action_columns:
          - ConsumptionPerCapita
        endogenous_columns:
          - InvestmentPerCapita
      output:
        data_path: ./data/interim/Ramsey_crra


  Ramsey_cara:
    dynare_model_settings:
      periods: ${metadata.periods}
      num_samples:
        base: ${metadata.num_samples}
        coefficient: 0.5  # actual = int(base * coefficient)
      column_names:
        - ConsumptionPerCapita
        - CapitalPerCapita
        - OutputPerCapita
        - InvestmentPerCapita
      parameter_ranges:
        start_capital: [0.5, 3.0]
        start_labor: [1.0, 1.0]
        alpha: [0.33, 0.66]
        beta: [0.95, 0.99]
        delta: [0.02, 0.15]
        sigma: [0.5, 3.0]
        n: [0.0, 0.02]

    rl_env_settings:
      discount_factor_param: beta
      reward: lib.rewards.cara_reward
      reward_kwargs:
        target_column: ConsumptionPerCapita
        sigma_column: sigma
      input:
        state_columns:
          - [CapitalPerCapita, -1]
          - OutputPerCapita
          - Labor
        action_columns:
          - ConsumptionPerCapita
        endogenous_columns:
          - InvestmentPerCapita
      output:
        data_path: ./data/interim/Ramsey_cara


  Ramsey_upgrade:
    dynare_model_settings:
      periods: ${metadata.periods}
      num_samples:
        base: ${metadata.num_samples}
        coefficient: 0.35  # actual = int(base * coefficient)
      column_names:
        - ConsumptionPerCapita
        - CapitalPerCapita
        - OutputPerCapita
        - InvestmentPerCapita
      parameter_ranges:
        start_capital: [0.5, 1.5]
        start_labor: [1.0, 1.0]
        alpha: [0.33, 0.66]
        beta: [0.95, 0.99]
        delta: [0.02, 0.15]
        sigma: [0.5, 3.0]
        n: [0.0, 0.02]

    rl_env_settings:
      discount_factor_param: beta
