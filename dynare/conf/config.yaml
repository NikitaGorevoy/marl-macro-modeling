      parameter_ranges:
        alpha: [0.33, 0.66]
        beta: [0.95, 0.99]
        delta: [0.02, 0.05]
        rho: [0.7, 0.9]
        sigma: [0.5, 3.0]
        productivity_shock_stderr: [0.005, 0.03]

    rl_env_settings:
      discount_factor_param: beta
