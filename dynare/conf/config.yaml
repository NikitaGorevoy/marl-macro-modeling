        beta: [0.95, 0.99]
        delta: [0.02, 0.05]
        rho: [0.7, 0.9]
        sigma: [1.0, 2.0]
        l_ss_target: [0.30, 0.40]
      shocks:
        productivity:
          num_shocks: 4
          period_range: [20, 80]
          value_range: [-0.1, 0.1]
        capital:
          num_shocks: 2
          period_range: [20, 80]
