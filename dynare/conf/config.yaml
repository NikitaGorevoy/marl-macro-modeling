      parameter_ranges:
        start_capital: [0.5, 1.5]
        alpha: [0.3, 0.4]
        beta: [0.4, 0.6]
        delta: [0.8, 0.9]
        n: [0.05, 0.1]
        g: [0.2, 0.3]

    rl_env_settings:
      discount_factor_param: beta
      reward: lib.rewards.olg_log_utility_reward
      reward_kwargs:
        consumption_young_column: ConsYoung
        consumption_old_column: ConsOld
        beta_column: beta
      input:
        state_columns:
          - [Capital, -1]
          - Output
          - Wage
          - InterestRate
          - Savings
        action_columns:
          - Savings
        endogenous_columns:
          - ConsYoung
          - ConsOld
      output:
        data_path: ./data/interim/OLG


  RBC_baseline_pf:
    dynare_model_settings:
      periods: ${metadata.periods}
      num_samples:
