        b_w_target: [0.4, 0.6]
        lambda_w: [0.4, 0.8]
        g_share: [0.1, 0.5]
        rho_z: [0.90, 0.98]
        rho_g: [0.85, 0.95]
        stderr_z: [0.005, 0.02]
        stderr_g: [0.005, 0.02]

    rl_env_settings:
      discount_factor_param: beta
      reward: lib.rewards.stability_reward
      reward_kwargs:
        target_column: InflationRate
      input:
        state_columns:
          - [Employment, -1]
          - [Vacancies, -1]
          - [MeetingRate, -1]
          - [NominalInterestRate, -1]
          - LogTFP
          - GovernmentSpendingShock
          - Consumption
          - InflationRate
          - UnemploymentRate
          - MarginalCosts
          - RealWage
          - GrossOutputB
        action_columns:
          - NominalInterestRate
        endogenous_columns:
          - LagrangeMultiplierA
          - LagrangeMultiplierB
          - MarketTightness
          - Matches
          - GrossOutputA
          - GovernmentSpending
          - LogOutput
          - LogVacancies
          - LogWages
          - LogUnemployment
          - LogTightnessA
          - LogTightnessB
      output:
        data_path: ./data/interim/Faia_2008


  Faia_Monacelli_2008:
    dynare_model_settings:
      periods: ${metadata.periods}
      num_samples:
        base: ${metadata.num_samples}
        coefficient: 1.0  # actual = int(base * coefficient)
      parameter_ranges:
        beta: [0.98, 0.995]
        sigma: [1.0, 3.0]
        phi: [1.0, 5.0]
        eta: [0.5, 2.0]
        gamma_h: [0.5, 0.9]
        epsilon: [5.0, 11.0]
        psi_p: [30.0, 100.0]
        rho_a: [0.8, 0.95]
        rho_ystar: [0.8, 0.95]
        rho_pistar: [0.3, 0.7]
        phi_pi: [1.2, 2.5]
        phi_y: [0.0, 0.5]
        stderr_a: [0.005, 0.02]
        stderr_ystar: [0.005, 0.02]
        stderr_pistar: [0.002, 0.01]

    rl_env_settings:
      discount_factor_param: beta
      reward: lib.rewards.soe_welfare_reward
      reward_kwargs:
        consumption_column: Consumption
        labor_column: Labor
        sigma_column: sigma
        phi_column: phi
        sigma_default: 1.0
        phi_default: 3.0
      input:
        state_columns:
          - [TermsOfTrade, -1]
          - [NominalExchangeRate, -1]
          - [NominalInterestRate, -1]
          - [PriceRatioH, -1]
          - LogProductivity
          - OutputForeign
          - InflationForeign
          - Consumption
          - Output
          - RealExchangeRate
          - InflationCPI
          - MarginalCost
        action_columns:
          - NominalInterestRate
        endogenous_columns:
          - InflationH
          - ConsumptionH
          - ConsumptionF
          - Labor
          - Wage
          - Lambda
          - RealInterestRate
          - DepreciationRate
          - Productivity
          - ConsumptionForeign
          - LogOutput
          - LogConsumption
          - LogRealExchangeRate
          - LogTermsOfTrade
          - LogInflationH
      output:
        data_path: ./data/interim/Faia_Monacelli_2008


