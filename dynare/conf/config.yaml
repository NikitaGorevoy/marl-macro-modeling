        beta: [0.95, 0.99]
        delta: [0.02, 0.05]
        rho: [0.7, 0.9]
        sigma: [0.5, 3.0]
      shocks:
        productivity:
          num_shocks: 4
          period_range: [10, 90]
          value_range: [-0.1, 0.1]

    rl_env_settings:
      discount_factor_param: beta
